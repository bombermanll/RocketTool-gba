  </defs>
  <rect width="1200" height="360" rx="28" fill="#f7f2e8"/>
  <text x="60" y="64" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="30" font-weight="700" fill="#102e4a">工作流程</text>
  <g font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="19" fill="#102e4a" font-weight="650">
    <rect x="64" y="118" width="210" height="112" rx="20" fill="#efe5d3"/><text x="105" y="166">1. 启动 mGBA</text><text x="102" y="197" font-size="15" font-weight="400">加载 ROM / 存档</text>
    <rect x="354" y="118" width="210" height="112" rx="20" fill="#efe5d3"/><text x="385" y="166">2. 加载 Lua</text><text x="384" y="197" font-size="15" font-weight="400">mgba_bridge.lua</text>
