  <line x1="284" y1="174" x2="344" y2="174" stroke="#102e4a" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="574" y1="174" x2="634" y2="174" stroke="#102e4a" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="864" y1="174" x2="924" y2="174" stroke="#102e4a" stroke-width="4" marker-end="url(#arrow)"/>
